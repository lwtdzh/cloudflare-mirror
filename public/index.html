<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LWT's mirror site</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
.container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
h1 { text-align: center; color: #58a6ff; margin-bottom: 30px; font-size: 28px; }
.admin-link { text-align: center; margin-bottom: 20px; }
.admin-link a { color: #8b949e; font-size: 14px; text-decoration: none; }
.admin-link a:hover { color: #58a6ff; }
table { width: 100%; border-collapse: collapse; background: #161b22; border-radius: 8px; overflow: hidden; }
th { background: #21262d; color: #8b949e; text-align: left; padding: 12px 16px; font-weight: 600; }
td { padding: 12px 16px; border-top: 1px solid #30363d; }
tr:hover { background: #1c2128; }
.empty { text-align: center; padding: 40px; color: #8b949e; }
.mirror-link { color: #79c0ff; text-decoration: none; font-weight: 600; }
.mirror-link:hover { color: #a5d6ff; text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <h1>LWT's mirror site</h1>
  <div class="admin-link"><a href="/admin/">Admin</a></div>
  <table>
    <thead><tr><th>Sub Path</th><th>Delegated Path</th></tr></thead>
    <tbody id="mirrorBody"></tbody>
  </table>
</div>

<script>
const API = '/api/mirrors';

async function loadMirrors() {
  try {
    const res = await fetch(API);
    const mirrors = await res.json();
    renderTable(mirrors);
  } catch(e) { console.error('Failed to load mirrors:', e); }
}

function renderTable(mirrors) {
  const body = document.getElementById('mirrorBody');
  const sorted = [...mirrors].sort((a, b) => a.originalPath.localeCompare(b.originalPath));
  if (!sorted.length) {
    body.innerHTML = '<tr><td colspan="2" class="empty">No mirrors configured yet.</td></tr>';
    return;
  }
  body.innerHTML = sorted.map(m => `<tr>
    <td><a class="mirror-link" href="/${m.originalPath}">/${m.originalPath}</a></td>
    <td><a href="${m.delegatedPath}" target="_blank" style="color:#a5d6ff;font-size:12px;text-decoration:none">${m.delegatedPath}</a></td>
  </tr>`).join('');
}

loadMirrors();
</script>
</body>
</html>
