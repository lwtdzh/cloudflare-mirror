<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirror Admin</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
.container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
h1 { text-align: center; color: #58a6ff; margin-bottom: 30px; font-size: 28px; }
.actions { display: flex; justify-content: space-between; margin-bottom: 20px; }
.btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; transition: background 0.2s; }
.btn-primary { background: #238636; color: #fff; }
.btn-primary:hover { background: #2ea043; }
.btn-danger { background: #da3633; color: #fff; }
.btn-danger:hover { background: #f85149; }
.btn-secondary { background: #30363d; color: #c9d1d9; border: 1px solid #444c56; }
.btn-secondary:hover { background: #444c56; }
.btn-edit { background: #1f6feb; color: #fff; }
.btn-edit:hover { background: #388bfd; }
table { width: 100%; border-collapse: collapse; background: #161b22; border-radius: 8px; overflow: hidden; }
th { background: #21262d; color: #8b949e; text-align: left; padding: 12px 16px; font-weight: 600; }
td { padding: 12px 16px; border-top: 1px solid #30363d; }
td:last-child { text-align: right; }
tr:hover { background: #1c2128; }
.empty { text-align: center; padding: 40px; color: #8b949e; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
.modal-overlay.active { display: flex; }
.modal { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 24px; width: 90%; max-width: 500px; }
.modal h2 { color: #58a6ff; margin-bottom: 20px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; color: #8b949e; margin-bottom: 6px; font-size: 13px; }
.form-group input { width: 100%; padding: 10px 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 14px; }
.form-group input:focus { outline: none; border-color: #58a6ff; }
.modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
.toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 6px; z-index: 200; font-size: 14px; transition: opacity 0.3s; }
.toast-success { background: #238636; color: #fff; }
.toast-error { background: #da3633; color: #fff; }
/* Login screen */
.login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.login-box { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 32px; width: 90%; max-width: 380px; text-align: center; }
.login-box h2 { color: #58a6ff; margin-bottom: 8px; }
.login-box p { color: #8b949e; font-size: 13px; margin-bottom: 24px; }
.login-box input { width: 100%; padding: 10px 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 14px; margin-bottom: 16px; }
.login-box input:focus { outline: none; border-color: #58a6ff; }
.login-error { color: #f85149; font-size: 13px; margin-bottom: 12px; display: none; }
.admin-content { display: none; }
</style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>🔒 Admin Login</h2>
    <p>Enter the admin password to continue</p>
    <div class="login-error" id="loginError"></div>
    <input type="password" id="loginPassword" placeholder="Password" autofocus>
    <button class="btn btn-primary" style="width:100%" onclick="attemptLogin()">Login</button>
  </div>
</div>

<!-- Admin Content (hidden until login) -->
<div class="admin-content" id="adminContent">
  <div class="container">
    <h1>Mirror Admin</h1>
    <div style="text-align:center;margin-bottom:16px">
      <a href="/" style="color:#8b949e;font-size:13px">Back to Mirror List</a>
      <span style="margin:0 8px;color:#30363d">|</span>
      <a href="#" style="color:#8b949e;font-size:13px" onclick="logout();return false">Logout</a>
    </div>
    <div class="actions">
      <button class="btn btn-primary" onclick="openAddModal()">+ Add Mirror</button>
      <button class="btn btn-secondary" onclick="loadMirrors()">Refresh</button>
    </div>
    <table id="mirrorTable">
      <thead><tr><th>Original Path</th><th>Delegated Path</th><th>Actions</th></tr></thead>
      <tbody id="mirrorBody"></tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Add Mirror</h2>
    <input type="hidden" id="editOldOriginalPath">
    <div class="form-group">
      <label>Original Path (e.g. "def2")</label>
      <input type="text" id="originalPath" placeholder="def2">
    </div>
    <div class="form-group">
      <label>Delegated Path (e.g. "http://x.y/abc/def")</label>
      <input type="text" id="delegatedPath" placeholder="http://x.y/abc/def">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveMirror()">Save</button>
    </div>
  </div>
</div>

<script>
const API = '/api/mirrors';
let mirrors = [];
let adminPassword = '';

// --- Login ---
function getStoredPassword() {
  return sessionStorage.getItem('admin_password') || '';
}

function storePassword(password) {
  sessionStorage.setItem('admin_password', password);
}

function clearPassword() {
  sessionStorage.removeItem('admin_password');
}

function authHeaders() {
  return { 'X-Admin-Password': adminPassword };
}

async function attemptLogin() {
  const passwordInput = document.getElementById('loginPassword');
  const errorEl = document.getElementById('loginError');
  const password = passwordInput.value;
  if (!password) {
    errorEl.textContent = 'Please enter a password';
    errorEl.style.display = 'block';
    return;
  }
  try {
    const res = await fetch(API + '?verify', {
      headers: { 'X-Admin-Password': password },
    });
    if (res.status === 401 || res.status === 403) {
      errorEl.textContent = 'Invalid password. Please try again.';
      errorEl.style.display = 'block';
      passwordInput.value = '';
      passwordInput.focus();
      return;
    }
    if (!res.ok) {
      errorEl.textContent = 'Server error. Please try again later.';
      errorEl.style.display = 'block';
      return;
    }
    adminPassword = password;
    storePassword(password);
    mirrors = await res.json();
    showAdminContent();
    renderTable();
  } catch (e) {
    errorEl.textContent = 'Connection error: ' + e.message;
    errorEl.style.display = 'block';
  }
}

function showAdminContent() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminContent').style.display = 'block';
}

function logout() {
  adminPassword = '';
  clearPassword();
  document.getElementById('adminContent').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginError').style.display = 'none';
}

// Allow pressing Enter on the password field to login
document.getElementById('loginPassword').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') attemptLogin();
});

// --- Auto-login from session ---
(async function autoLogin() {
  const stored = getStoredPassword();
  if (!stored) return;
  try {
    const res = await fetch(API + '?verify', { headers: { 'X-Admin-Password': stored } });
    if (res.ok) {
      adminPassword = stored;
      mirrors = await res.json();
      showAdminContent();
      renderTable();
    } else {
      clearPassword();
    }
  } catch (e) {
    clearPassword();
  }
})();

// --- Mirror CRUD ---
async function loadMirrors() {
  try {
    const res = await fetch(API, { headers: authHeaders() });
    if (res.status === 401 || res.status === 403) { logout(); showToast('Session expired. Please login again.', 'error'); return; }
    mirrors = await res.json();
    renderTable();
  } catch(e) { showToast('Failed to load mirrors: ' + e.message, 'error'); }
}

function renderTable() {
  const sorted = [...mirrors].sort((a, b) => a.originalPath.localeCompare(b.originalPath));
  const body = document.getElementById('mirrorBody');
  if (!mirrors.length) {
    body.innerHTML = '<tr><td colspan="3" class="empty">No mirrors configured. Click "+ Add Mirror" to start.</td></tr>';
    return;
  }
  body.innerHTML = sorted.map(m => {
    const escOrig = m.originalPath.replace(/'/g, "\\'");
    const escDel = m.delegatedPath.replace(/'/g, "\\'");
    return `<tr>
      <td><a href="/${m.originalPath}" style="color:#79c0ff;text-decoration:none;font-weight:600" title="Visit /${m.originalPath}">${m.originalPath}</a></td>
      <td><a href="${m.delegatedPath}" style="color:#a5d6ff;font-size:12px;text-decoration:none" title="Visit delegated site">${m.delegatedPath}</a></td>
      <td>
        <button class="btn btn-edit" style="padding:6px 12px;font-size:12px" onclick="openEditModal('${escOrig}','${escDel}')">Edit</button>
        <button class="btn btn-danger" style="padding:6px 12px;font-size:12px" onclick="deleteMirror('${escOrig}')">Delete</button>
      </td>
    </tr>`;
  }).join('');
}

function generateDefaultPath() {
  const now = new Date();
  const pad = (n, len = 2) => String(n).padStart(len, '0');
  return `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
}

function openAddModal() {
  document.getElementById('modalTitle').textContent = 'Add Mirror';
  document.getElementById('editOldOriginalPath').value = '';
  document.getElementById('originalPath').value = generateDefaultPath();
  document.getElementById('delegatedPath').value = '';
  document.getElementById('modalOverlay').classList.add('active');
}

function openEditModal(orig, deleg) {
  document.getElementById('modalTitle').textContent = 'Edit Mirror';
  document.getElementById('editOldOriginalPath').value = orig;
  document.getElementById('originalPath').value = orig;
  document.getElementById('delegatedPath').value = deleg;
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

async function saveMirror() {
  const oldOriginalPath = document.getElementById('editOldOriginalPath').value;
  const originalPath = document.getElementById('originalPath').value.trim();
  const delegatedPath = document.getElementById('delegatedPath').value.trim();
  if (!originalPath || !delegatedPath) { showToast('Both fields are required', 'error'); return; }
  try {
    let res;
    if (oldOriginalPath) {
      res = await fetch(API, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ oldOriginalPath, originalPath, delegatedPath }),
      });
    } else {
      res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ originalPath, delegatedPath }),
      });
    }
    if (res.status === 401 || res.status === 403) { logout(); showToast('Session expired. Please login again.', 'error'); return; }
    if (!res.ok) {
      const err = await res.json();
      showToast(err.error || 'Failed', 'error');
      return;
    }
    const saved = await res.json();
    closeModal();
    // Optimistically update local list so it shows immediately
    if (oldOriginalPath) {
      mirrors = mirrors.filter(m => m.originalPath !== oldOriginalPath);
    }
    mirrors.push(saved);
    renderTable();
    showToast(oldOriginalPath ? 'Mirror updated' : 'Mirror added', 'success');
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

async function deleteMirror(originalPath) {
  if (!confirm('Delete mirror "' + originalPath + '"?')) return;
  try {
    const res = await fetch(API + '?originalPath=' + encodeURIComponent(originalPath), {
      method: 'DELETE',
      headers: authHeaders(),
    });
    if (res.status === 401 || res.status === 403) { logout(); showToast('Session expired. Please login again.', 'error'); return; }
    if (!res.ok) { showToast('Failed to delete', 'error'); return; }
    // Optimistically remove from local list
    mirrors = mirrors.filter(m => m.originalPath !== originalPath);
    renderTable();
    showToast('Mirror deleted', 'success');
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
}
</script>
</body>
</html>
